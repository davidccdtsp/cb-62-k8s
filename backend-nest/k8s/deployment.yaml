apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-nest
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-nest
  template:
    metadata:
      labels:
        app: backend-nest
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "backend-nest"
    spec:
      containers:
        - name: backend-nest
          image: backend-nest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-backend
                  key: public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-backend
                  key: secret-key
                  optional: true
            - name: LANGFUSE_HOST
              value: "http://langfuse-web.langfuse.svc.cluster.local:3000"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "poc"
            - name: KEYCLOAK_AUDIENCE
              value: "backend-nest-k8s"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
