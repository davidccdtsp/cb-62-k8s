apiVersion: v1
kind: Service
metadata:
  name: langfuse-external
  namespace: langfuse
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: langfuse
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
      nodePort: 30900
