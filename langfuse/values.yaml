langfuse:
  encryptionKey:
    secretKeyRef:
      name: langfuse
      key: encryption-key

  salt:
    secretKeyRef:
      name: langfuse
      key: salt

  nextauth:
    secret:
      secretKeyRef:
        name: langfuse
        key: nextauth-secret

  # Bootstrap automático en el primer arranque
  additionalEnv:
    - name: LANGFUSE_INIT_ORG_ID
      value: "1f85a49e-0a1b-4569-9c2a-5e575304b1a6"
    - name: LANGFUSE_INIT_ORG_NAME
      value: "poc-company"
    - name: LANGFUSE_INIT_PROJECT_ID
      value: "c5455301-ca9c-4877-94a8-5ba89119facb"
    - name: LANGFUSE_INIT_PROJECT_NAME
      value: "poc-project"
    - name: LANGFUSE_INIT_USER_EMAIL
      value: "admin@admin.com"
    - name: LANGFUSE_INIT_USER_NAME
      value: "admin"
    - name: LANGFUSE_INIT_USER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: langfuse
          key: init-user-password
    - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse
          key: init-public-key
    - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse
          key: init-secret-key

postgresql:
  auth:
    existingSecret: langfuse
    secretKeys:
      adminPasswordKey: postgresql-password
      userPasswordKey: postgresql-password

clickhouse:
  auth:
    existingSecret: langfuse
    existingSecretKey: clickhouse-password
  replicaCount: 1
  shards: 1
  zookeeper:
    enabled: false

redis:
  auth:
    existingSecret: langfuse
    existingSecretPasswordKey: redis-password

s3:
  auth:
    existingSecret: langfuse
    rootUserSecretKey: s3-user
    rootPasswordSecretKey: s3-password
