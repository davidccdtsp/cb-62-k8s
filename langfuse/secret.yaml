apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: langfuse
stringData:
  salt: poc-salt-changeme-in-production
  encryption-key: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  nextauth-secret: poc-nextauth-secret-changeme
  postgresql-password: poc-pg-password
  clickhouse-password: poc-ch-password
  redis-password: poc-redis-password
  s3-user: poc-s3-user
  s3-password: poc-s3-password
  # Credenciales iniciales — Langfuse las aplica en el primer arranque
  init-user-password: admin1234
  init-public-key: pk-lf-poc00000000000000000000000001
  init-secret-key: sk-lf-poc00000000000000000000000001
