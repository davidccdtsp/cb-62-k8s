                "tooltip": {"mode": "single", "sort": "none"}
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT toStartOfInterval(timestamp, toIntervalSecond($__interval_s)) AS time, count() AS ejecuciones FROM traces WHERE name = 'agent-run' AND is_deleted = 0 AND timestamp >= $__fromTime AND timestamp < $__toTime GROUP BY time ORDER BY time ASC",
                "refId": "A", "format": 0
              }],
              "title": "Ejecuciones por intervalo",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
