              },
              "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
              "id": 1,
              "options": {
                "colorMode": "value", "graphMode": "none", "justifyMode": "auto",
                "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
                "textMode": "auto"
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT count() AS runs FROM traces WHERE name = 'agent-run' AND is_deleted = 0 AND timestamp >= $__fromTime AND timestamp < $__toTime",
                "refId": "A", "format": 1
              }],
              "title": "Ejecuciones del agente",
              "type": "stat"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "fixed", "fixedColor": "green"},
                  "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
              "id": 2,
              "options": {
                "colorMode": "value", "graphMode": "none", "justifyMode": "auto",
                "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
                "textMode": "auto"
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT sum(usage_details['input']) AS prompt_tokens FROM observations WHERE type = 'GENERATION' AND is_deleted = 0 AND start_time >= $__fromTime AND start_time < $__toTime",
                "refId": "A", "format": 1
              }],
              "title": "Tokens de entrada (prompt)",
              "type": "stat"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "fixed", "fixedColor": "purple"},
                  "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]},
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
              "id": 3,
              "options": {
                "colorMode": "value", "graphMode": "none", "justifyMode": "auto",
                "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
                "textMode": "auto"
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT sum(usage_details['output']) AS completion_tokens FROM observations WHERE type = 'GENERATION' AND is_deleted = 0 AND start_time >= $__fromTime AND start_time < $__toTime",
                "refId": "A", "format": 1
              }],
              "title": "Tokens de salida (completion)",
              "type": "stat"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "thresholds"},
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {"color": "green", "value": null},
                      {"color": "yellow", "value": 500},
                      {"color": "red", "value": 2000}
                    ]
                  },
                  "unit": "ms"
                },
                "overrides": []
              },
              "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
              "id": 4,
              "options": {
                "colorMode": "value", "graphMode": "none", "justifyMode": "auto",
                "reduceOptions": {"calcs": ["mean"], "fields": "", "values": false},
                "textMode": "auto"
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT round(avg(dateDiff('millisecond', start_time, end_time))) AS avg_latency_ms FROM observations WHERE type = 'GENERATION' AND is_deleted = 0 AND end_time IS NOT NULL AND start_time >= $__fromTime AND start_time < $__toTime",
                "refId": "A", "format": 1
              }],
              "title": "Latencia media de generación",
              "type": "stat"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "palette-classic"},
                  "custom": {
                    "drawStyle": "bars", "fillOpacity": 80, "lineWidth": 1,
                    "showPoints": "never", "spanNulls": false,
                    "stacking": {"group": "A", "mode": "normal"},
                    "thresholdsStyle": {"mode": "off"}
                  },
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
              "id": 5,
              "options": {
                "legend": {"calcs": ["sum", "mean"], "displayMode": "table", "placement": "bottom", "showLegend": true},
                "tooltip": {"mode": "multi", "sort": "none"}
              },
              "targets": [{
                "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
                "rawSql": "SELECT toStartOfInterval(start_time, toIntervalSecond($__interval_s)) AS time, sum(usage_details['input']) AS \"Prompt tokens\", sum(usage_details['output']) AS \"Completion tokens\" FROM observations WHERE type = 'GENERATION' AND is_deleted = 0 AND start_time >= $__fromTime AND start_time < $__toTime GROUP BY time ORDER BY time ASC",
                "refId": "A", "format": 0
              }],
              "title": "Tokens por intervalo",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "grafana-clickhouse-datasource", "uid": "langfuse-clickhouse"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "fixed", "fixedColor": "blue"},
                  "custom": {
