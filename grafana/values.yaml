## Pass the plugins you want installed as a list.
##
plugins:
  - grafana-clickhouse-datasource
  # - digrich-bubblechart-panel
  # - grafana-clock-panel
  ## You can also use other plugin download URL, as long as they are valid zip files,
  ## and specify the name of the plugin as prefix, with an version. Like this:
  # - marcusolsson-json-datasource@1.3.24@https://grafana.com/api/plugins/marcusolsson-json-datasource/versions/1.3.24/download

## Configure grafana datasources
## ref: http://docs.grafana.org/administration/provisioning/#datasources
##
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Mimir
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Tempo
        orgId: 1
      - name: Langfuse ClickHouse
        orgId: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "1"

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "1"

      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo-gateway.monitoring.svc.cluster.local
        isDefault: false
        editable: false
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: mimir
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
        secureJsonData:
          httpHeaderValue1: "1"

      - name: Langfuse ClickHouse
        type: grafana-clickhouse-datasource
        uid: langfuse-clickhouse
        access: proxy
        editable: false
        jsonData:
          server: langfuse-clickhouse.langfuse.svc.cluster.local
          port: 9000
          protocol: native
          username: default
          defaultDatabase: default
        secureJsonData:
          password: "poc-ch-password"

