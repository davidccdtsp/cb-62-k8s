services:
  apache:
    image: httpd:alpine
    ports:
      - "81:81"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    networks:
      - observability-nest
    depends_on:
      - backend-nest

  backend-nest:
    build:
      context: ..
      dockerfile: external-nest/Dockerfile
    environment:
      OTEL_SERVICE_NAME: backend-nest
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=external
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy-nest:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://keycloak.${MINIKUBE_IP}.nip.io}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-poc}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-backend-nest-external}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    networks:
      - observability-nest
      - minikube
    depends_on:
      - alloy-nest

  alloy-nest:
    image: grafana/alloy:latest
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    environment:
      ALLOY_BEARER_TOKEN: ${ALLOY_BEARER_TOKEN}
      CLUSTER_ALLOY_ENDPOINT: ${CLUSTER_ALLOY_ENDPOINT}
    volumes:
      - ../external/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12346:12345"
    networks:
      - observability-nest
      - minikube

networks:
  observability-nest:
    driver: bridge
  minikube:
    external: true
    name: minikube
